# ---------- #

- name: <Archlinux> Squashfs tools to generate system image
  community.general.pacman:
    name: squashfs-tools
    state: present
  when: ansible_facts["distribution"] in ['Archlinux']

- name: <Debian/Ubuntu> Squashfs tools to generate system image
  apt:
    name: squashfs-tools
    state: present
  when: ansible_facts["distribution"] in ['Debian', 'Ubuntu']

- name: Prepare pxe image
  block:
    - name: Mask systemd services
      systemd_service:
        name: "{{ item }}"
        masked: true
      with_items:
        - systemd-network-generator
        - systemd-hostnamed.socket
        - systemd-hostnamed.service
        - suspend.target
    
    - name: Disable suspend in logind.conf
      lineinfile:
        regexp: '^[#]?{{ item }}='
        line: '{{ item }}=poweroff'
        path: /etc/systemd/logind.conf
        state: present
      loop:
        - HandleSuspendKey
        - HandleHibernateKey
        - HandleLidSwitch
        - HandleLidSwitchExternalPower
    
    - name: Disable suspend in sleep.conf
      lineinfile:
        regexp: '^[#]?AllowSuspend='
        line: AllowSuspend=no
        path: /etc/systemd/sleep.conf
        state: present
  when: ('pxe-image' in setup_facts.setup.ansible_options)

- name: Check /var/tmp/sfs/rootfs.img has not been generated already
  stat:
    path: /var/tmp/sfs/rootfs.img
  register: check_result

- name: Create a squashfs snapshot based on rootfs
  shell: |
    EXCLUDE_PATHS=(
      "boot/*" "cidata*" "dev/*" "efi/*" "etc/fstab*" "etc/crypttab*" "etc/systemd/system/cloud-*" "usr/lib/systemd/system/cloud-*"
      "proc/*" "sys/*" "run/*" "mnt/*" "share/*" "srv/pxe/*" "srv/img/*" "srv/tar/*" "media/*" "tmp/*" "swap/*" "var/tmp/*" "var/log/*"
      "var/cache/pacman/pkg/*" "var/cache/apt/*" "var/cache/dnf/*" "var/cache/yum/*" "var/lib/cloud/*" "etc/systemd/system/snapper-*"
      "usr/lib/systemd/system/snapper-*" "etc/systemd/system/timers.target.wants/snapper-*"
      "root/.ssh/authorized_keys"
    )
    mkdir -p /var/tmp/sfs
    sync
    mksquashfs / /var/tmp/sfs/rootfs.img -comp zstd -Xcompression-level 4 -b 1M -progress -wildcards -e "${EXCLUDE_PATHS[@]}"
  when: not check_result.stat.exists

- name: Revert changes for pxe image
  block:
    - name: Unmask systemd services
      systemd_service:
        name: "{{ item }}"
        masked: false
      with_items:
        - systemd-network-generator
        - systemd-hostnamed.socket
        - systemd-hostnamed.service
        - suspend.target
    
    - name: Reenable suspend in logind.conf
      lineinfile:
        regexp: '^[#]?{{ item }}='
        line: '{{ item }}=suspend'
        path: /etc/systemd/logind.conf
        state: present
      loop:
        - HandleSuspendKey
        - HandleHibernateKey
        - HandleLidSwitch
        - HandleLidSwitchExternalPower
    
    - name: Reenable suspend in sleep.conf
      lineinfile:
        regexp: '^[#]?AllowSuspend='
        line: AllowSuspend=yes
        path: /etc/systemd/sleep.conf
        state: present
  when: ('pxe-image' in setup_facts.setup.ansible_options)

- name: Squashfs successfully generated
  stat:
    path: /var/tmp/sfs/rootfs.img
  register: stat_result
  failed_when: not stat_result.stat.exists
