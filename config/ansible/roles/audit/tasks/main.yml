# ---------- #

- name: <Archlinux> Install required packages
  community.general.pacman:
    name:
      - lynis
      - python-ansi2html
    state: present
  when: ansible_facts["distribution"] in ['Archlinux']

- name: <Debian,Ubuntu> Install required packages
  apt:
    name:
      - lynis
      - colorized-logs
    state: present
  when: ansible_facts["distribution"] in ['Debian', 'Ubuntu']

- name: Create an audit profile to include custom options
  copy:
    dest: /etc/lynis/custom.prf
    mode: 0644
    content: |
      # debian and ubuntu versions are old per design
      skip-test=LYNIS
      # pxe boot needs special attention
      skip-test=BOOT-5122
      # /var and /home shall be on the same partition
      skip-test=FILE-6310
      # usb drivers are needed
      skip-test=USB-1000
      # firewire drivers are needed
      skip-test=STRG-1846
      # not part of a domain
      skip-test=NAME-4028
      # /etc/hosts contains FQDN names, duh...
      skip-test=NAME-4404
      # security updates are always included in unattended upgrades
      skip-test=PKGS-7320
      # security updates are always included in unattended upgrades
      skip-test=PKGS-7398
      # no fiddling around with port 22/ssh
      skip-test=SSH-7408:port
      # automation tools are everywhere
      skip-test=TOOL-5002
      # kernel module loading is needed
      skip-test=KRNL-6000:kernel.modules_disabled
      # passwords lasts as long as the user wants to - this does not increase security just by enforcing it
      skip-test=AUTH-9282
      # passwords lasts as long as the user wants to - this does not increase security just by enforcing it
      skip-test=AUTH-9286
      # because it is configured this way
      skip-test=KRNL-5788
      # the security repository is configured
      skip-test=PKGS-7388
      # ufw leaves rules empty when not used
      skip-test=FIRE-4513
      # why should I warn unauthorized users?! Do they crap their pants when they read "please don't do this"?!
      skip-test=BANN-7126
      # why should I warn unauthorized users?! Do they crap their pants when they read "please don't do this"?!
      skip-test=BANN-7130
      # when file integrity is compromised, automation rebuilds it, backups restore it
      skip-test=FINT-4350
      # apt-listbugs has no installation candidate on ubuntu: skipping, as unattended-upgrades does the job for you
      skip-test=DEB-0810

- name: Get current date
  shell: date +%F
  register: current_date

- name: Set audit preparation facts
  set_fact:
    log_file_ansi: /srv/audit/lynis-report-{{ ansible_facts["distribution_release"] }}-{{ current_date.stdout_lines[0] }}.log
    log_file_dat: /srv/audit/lynis-report-{{ ansible_facts["distribution_release"] }}-{{ current_date.stdout_lines[0] }}.dat
    log_file_html: /srv/audit/lynis-report-{{ ansible_facts["distribution_release"] }}-{{ current_date.stdout_lines[0] }}.html

- name: Perform a security audit
  shell: |
    mkdir -p /srv/audit
    LC_ALL=C LANG="en" lynis audit system > {{ log_file_ansi | quote }}
    cat {{ log_file_ansi | quote }} | LC_ALL=C ansi2html > {{ log_file_html | quote }}
    cp /var/log/lynis-report.dat {{ log_file_dat | quote }}

- name: Load audit data
  slurp:
    src: '{{ log_file_dat }}'
  register: audit_dat

- name: Set audit result facts
  set_fact:
    audit_results: >-
      {{
        audit_results | default({}) | combine(
          { item[0]|replace('[]',''): [ item[1:]|join('=') ] }
            if '[]' in item[0] else
          { item[0]: item[1:]|join('=') }
        , list_merge='append')
      }}
  loop: "{{ (audit_dat.content | b64decode).split('\n') | reject('search', '^[#]|^$') | map('split', '=') | list }}"
  loop_control:
    label: "{{ item[0] }}"

- name: Assert audit has finished
  assert:
    that: audit_results.finish is truthy

- name: Assert hardening index is greater than or equal to 80
  assert:
    that: audit_results.hardening_index|int >= 80
    success_msg: "{{ audit_results.hardening_index }}"
    fail_msg: "{{ audit_results.hardening_index }}"
