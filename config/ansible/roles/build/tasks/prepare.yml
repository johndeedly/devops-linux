# ---------- #

- name: <Archlinux> Install libeatmydata
  community.general.pacman:
    # unsafe way, remember to perform a full system upgrade afterwards
    update_cache: true
    name: libeatmydata
    state: present
  when: ansible_facts["distribution"] in ['Archlinux']

- name: <Debian,Ubuntu> Install libeatmydata
  apt:
    update_cache: true
    name:
      - eatmydata
      - libeatmydata1
    state: present
  when: ansible_facts["distribution"] in ['Debian', 'Ubuntu']

- name: <Archlinux> Disable fsync system-wide
  lineinfile:
    line: /usr/lib/libeatmydata.so
    path: /etc/ld.so.preload
    state: present
    create: true
  when: ansible_facts["distribution"] in ['Archlinux']

- name: <Debian,Ubuntu> Disable fsync system-wide
  lineinfile:
    line: /usr/lib/x86_64-linux-gnu/libeatmydata.so
    path: /etc/ld.so.preload
    state: present
    create: true
  when: ansible_facts["distribution"] in ['Debian', 'Ubuntu']