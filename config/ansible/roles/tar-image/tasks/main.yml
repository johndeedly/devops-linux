# ---------- #

- name: Check that rootfs tar exists
  stat:
    path: /var/tmp/sfs/rootfs.tar.zst
  register: stat_result

- name: Rootfs to tar archive
  include_role:
    name: rootfs-to-tar
  when: not stat_result.stat.exists

- name: Create /srv/tar
  file:
    path: /srv/tar
    state: directory
    mode: '0755'

- name: Set preparation facts
  set_fact:
    target_path: "/srv/tar/{{ setup_facts.setup.distro|default('devops-linux')|lower }}{{ ([''] + setup_facts.setup.shell_options)|join('-')|lower }}{{ ([''] + setup_facts.setup.ansible_options)|difference(['pxe-image','tar-image'])|join('-')|lower }}.tar.zst"

- name: "Move /var/tmp/sfs/rootfs.tar.zst to {{ target_path }}"
  command:
    cmd: "mv /var/tmp/sfs/rootfs.tar.zst {{ target_path | quote }}"
    removes: /var/tmp/sfs/rootfs.tar.zst
    creates: "{{ target_path }}"
