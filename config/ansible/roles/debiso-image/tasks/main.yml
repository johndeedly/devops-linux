# ---------- #

- name: Basic tools to generate iso
  apt:
    name:
      - xorriso
      - isolinux
      - syslinux-efi
      - grub-pc-bin
      - grub-efi-amd64-bin
      - grub-efi-ia32-bin
      - mtools
      - dosfstools
    state: present

- name: Check that squashfs exists
  stat:
    path: /var/tmp/sfs/rootfs.img
  register: stat_result

- name: Minimal rootfs to squashfs
  include_role:
    name: minimal-rootfs-to-sfs
  when: not stat_result.stat.exists

- name: Create /var/tmp/sfs/staging/live
  file:
    path: /var/tmp/sfs/staging/live
    state: directory
    mode: '0755'

- name: Fingerprint
  copy:
    dest: /var/tmp/sfs/staging/devops-linux
    mode: 0644
    content: |
      {{ lookup("pipe", "date +%F") }}

- name: Move /var/tmp/sfs/rootfs.img to /var/tmp/sfs/staging/live/filesystem.squashfs
  command:
    cmd: "mv /var/tmp/sfs/rootfs.img /var/tmp/sfs/staging/live/filesystem.squashfs"
    removes: /var/tmp/sfs/rootfs.img
    creates: /var/tmp/sfs/staging/live/filesystem.squashfs

- name: Copy boot files out of the root squashfs
  block:
    - name: Create /var/tmp/sfs/mnt
      file:
        path: /var/tmp/sfs/mnt
        state: directory
        mode: '0755'
    
    - name: Mount squashfs read-only
      ansible.posix.mount:
        path: /var/tmp/sfs/mnt
        src: /var/tmp/sfs/staging/live/filesystem.squashfs
        fstype: squashfs
        opts: loop
        state: mounted
    
    - name: "Copy /var/tmp/sfs/mnt/boot/vmlinuz-* to /var/tmp/sfs/staging/live/vmlinuz"
      shell: |
        cp /var/tmp/sfs/mnt/boot/vmlinuz-* /var/tmp/sfs/staging/live/vmlinuz
    
    - name: "Copy /var/tmp/sfs/mnt/boot/initrd.img-* to /var/tmp/sfs/staging/live/initrd"
      shell: |
        cp /var/tmp/sfs/mnt/boot/initrd.img-* /var/tmp/sfs/staging/live/initrd
    
    - name: Unmount squashfs
      ansible.posix.mount:
        path: /var/tmp/sfs/mnt
        state: unmounted

- name: Create boot menus for legacy and uefi
  block:
    - name: Create isolinux and grub folders
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /var/tmp/sfs/staging/isolinux
        - /var/tmp/sfs/staging/boot/grub/x86_64-efi
        - /var/tmp/sfs/staging/EFI/BOOT
    
    - name: Boot menu for legacy boot
      copy:
        dest: /var/tmp/sfs/staging/isolinux/isolinux.cfg
        mode: 0644
        content: |
          UI vesamenu.c32
          
          MENU TITLE Boot Menu
          DEFAULT linux
          TIMEOUT 150
          MENU RESOLUTION 640 480
          MENU COLOR border       30;44   #40ffffff #a0000000 std
          MENU COLOR title        1;36;44 #9033ccff #a0000000 std
          MENU COLOR sel          7;37;40 #e0ffffff #20ffffff all
          MENU COLOR unsel        37;44   #50ffffff #a0000000 std
          MENU COLOR help         37;40   #c0ffffff #a0000000 std
          MENU COLOR timeout_msg  37;40   #80ffffff #00000000 std
          MENU COLOR timeout      1;37;40 #c0ffffff #00000000 std
          MENU COLOR msg07        37;40   #90ffffff #a0000000 std
          MENU COLOR tabmsg       31;40   #30ffffff #00000000 std
          
          LABEL linux
            MENU LABEL Debian Live [BIOS/ISOLINUX]
            MENU DEFAULT
            KERNEL /live/vmlinuz
            APPEND initrd=/live/initrd boot=live
    
    - name: Boot menu for uefi boot
      copy:
        dest: "{{ item }}"
        mode: 0644
        content: |
          insmod part_gpt
          insmod part_msdos
          insmod fat
          insmod iso9660
          
          insmod all_video
          insmod font
    
          set default="0"
          set timeout=15
          
          menuentry "Debian Live [EFI/GRUB]" {
              search --no-floppy --set=root --file /devops-linux
              linux ($root)/live/vmlinuz boot=live
              initrd ($root)/live/initrd
          }
      loop:
        - /var/tmp/sfs/staging/boot/grub/grub.cfg
        - /var/tmp/sfs/staging/EFI/BOOT/grub.cfg

- name: Prepare grub config for optical boot
  copy:
    dest: /var/tmp/grub-embed.cfg
    mode: 0644
    content: |
      if ! [ -d "$cmdpath" ]; then
          # On some firmware, GRUB has a wrong cmdpath when booted from an optical disc.
          # https://gitlab.archlinux.org/archlinux/archiso/-/issues/183
          if regexp --set=1:isodevice '^(\([^)]+\))\/?[Ee][Ff][Ii]\/[Bb][Oo][Oo][Tt]\/?$' "$cmdpath"; then
              cmdpath="${isodevice}/EFI/BOOT"
          fi
      fi
      configfile "${cmdpath}/grub.cfg"

- name: "Copy /usr/lib/ISOLINUX/isolinux.bin to /var/tmp/sfs/staging/isolinux"
  shell: |
    cp /usr/lib/ISOLINUX/isolinux.bin /var/tmp/sfs/staging/isolinux/

- name: "Copy /usr/lib/syslinux/modules/bios/* to /var/tmp/sfs/staging/isolinux"
  shell: |
    cp /usr/lib/syslinux/modules/bios/* /var/tmp/sfs/staging/isolinux/

- name: "Copy /usr/lib/grub/x86_64-efi/* to /var/tmp/sfs/staging/boot/grub/x86_64-efi/"
  shell: |
    cp -r /usr/lib/grub/x86_64-efi/* /var/tmp/sfs/staging/boot/grub/x86_64-efi/

- name: Build grub for legacy and uefi
  shell: |
    grub-mkstandalone -O i386-efi \
      --modules="part_gpt part_msdos fat iso9660" \
      --locales="" \
      --themes="" \
      --fonts="" \
      --output="/var/tmp/sfs/staging/EFI/BOOT/BOOTIA32.EFI" \
      "boot/grub/grub.cfg=/var/tmp/grub-embed.cfg"
    grub-mkstandalone -O x86_64-efi \
      --modules="part_gpt part_msdos fat iso9660" \
      --locales="" \
      --themes="" \
      --fonts="" \
      --output="/var/tmp/sfs/staging/EFI/BOOT/BOOTx64.EFI" \
      "boot/grub/grub.cfg=/var/tmp/grub-embed.cfg"

- name: Fat16 partition for the boot process
  shell: |
    pushd /var/tmp/sfs/staging
      dd if=/dev/zero of=efiboot.img bs=1M count=20
      mkfs.vfat efiboot.img
      mmd -i efiboot.img ::/EFI ::/EFI/BOOT
      mcopy -vi efiboot.img \
        /var/tmp/sfs/staging/EFI/BOOT/BOOTIA32.EFI \
        /var/tmp/sfs/staging/EFI/BOOT/BOOTx64.EFI \
        /var/tmp/sfs/staging/boot/grub/grub.cfg \
        ::/EFI/BOOT/
    popd

- name: Set preparation facts
  set_fact:
    target_path: "/srv/liveiso/{{ ansible_facts['distribution'] | lower }}-x86_64.iso"

- name: Create /srv/liveiso
  file:
    path: /srv/liveiso
    state: directory
    mode: '0755'

- name: ISO packing
  shell: |
    xorriso \
      -as mkisofs \
      -iso-level 3 \
      -o "{{ target_path }}" \
      -full-iso9660-filenames \
      -volid DEBLIVE \
      --mbr-force-bootable -partition_offset 16 \
      -joliet -joliet-long -rational-rock \
      -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
      -eltorito-boot \
        isolinux/isolinux.bin \
        -no-emul-boot \
        -boot-load-size 4 \
        -boot-info-table \
        --eltorito-catalog isolinux/isolinux.cat \
      -eltorito-alt-boot \
        -e --interval:appended_partition_2:all:: \
        -no-emul-boot \
        -isohybrid-gpt-basdat \
      -append_partition 2 C12A7328-F81F-11D2-BA4B-00A0C93EC93B /var/tmp/sfs/staging/efiboot.img /var/tmp/sfs/staging

- name: ISO successfully generated
  stat:
    path: "{{ target_path }}"
  register: target_result
  failed_when: not target_result.stat.exists
