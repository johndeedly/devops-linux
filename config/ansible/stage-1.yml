- name: DevOps Linux Stage 1
  hosts: all
  gather_facts: true
  strategy: free
  pre_tasks:
    - name: Prepare
      include_role:
        name: build
        tasks_from: prepare
  tasks:
    - name: Print ansible facts
      debug:
        var: ansible_facts
        verbosity: 2
    - name: Print setup config
      debug:
        var: setup_facts
        verbosity: 2
    - name: First boot
      include_role:
        name: firstboot
    - name: Graphical base
      include_role:
        name: graphical-base
      when: ('graphical-base' in setup_facts.setup.ansible_options)
    - name: LDAP Client
      include_role:
        name: ldap-auth
      when: ('ldap-auth' in setup_facts.setup.ansible_options)
  post_tasks:
    - name: Wrapup
      include_role:
        name: build
        tasks_from: wrapup
